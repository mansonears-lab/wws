<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Vault Pro - Shared</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        :root {
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --sidebar: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .sidebar-link.active {
            background: rgba(79, 70, 229, 0.08);
            color: var(--accent);
            border-right: 3px solid var(--accent);
        }

        .media-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .media-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.1);
            border-color: var(--accent);
        }

        .media-card .actions { opacity: 0; transform: translateY(10px); transition: all 0.2s ease; }
        .media-card:hover .actions { opacity: 1; transform: translateY(0); }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        #dropOverlay {
            display: none;
            background: rgba(79, 70, 229, 0.05);
            border: 4px dashed var(--accent);
        }

        #authScreen {
            background-color: #f1f5f9;
            background-image: radial-gradient(circle at top right, rgba(79, 70, 229, 0.1), transparent),
                              radial-gradient(circle at bottom left, rgba(79, 70, 229, 0.05), transparent);
        }

        #playerContent video, #playerContent img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 12px;
        }
    </style>
</head>
<body class="flex h-screen">

    <!-- Auth Screen -->
    <div id="authScreen" class="fixed inset-0 z-[200] flex items-center justify-center p-6">
        <div class="w-full max-w-md space-y-8 glass p-10 rounded-3xl shadow-2xl">
            <div class="text-center">
                <div class="inline-flex bg-indigo-600 p-4 rounded-2xl shadow-lg shadow-indigo-500/20 mb-6">
                    <i class="fas fa-vault text-3xl text-white"></i>
                </div>
                <h2 class="text-3xl font-bold tracking-tight text-slate-900">Vault<span class="text-indigo-600">Pro</span></h2>
                <p class="text-slate-500 mt-2 text-sm">Sign in to access your shared cloud vault</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Username</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="userIn" required class="w-full bg-white border border-slate-200 rounded-xl py-3 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-sm text-slate-800" placeholder="Zenoom">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="password" id="passIn" required class="w-full bg-white border border-slate-200 rounded-xl py-3 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-sm text-slate-800" placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-indigo-500/20 transition-all transform active:scale-95 flex items-center justify-center gap-2">
                    Unlock Vault
                </button>
            </form>
            <p id="errorMsg" class="text-red-500 text-xs text-center hidden font-medium">Invalid credentials. Access denied.</p>
        </div>
    </div>

    <!-- Main App Layout -->
    <div id="appLayout" class="flex w-full h-full opacity-0 pointer-events-none transition-opacity duration-700">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col hidden lg:flex">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-8">
                    <div class="bg-indigo-600 p-2 rounded-xl shadow-md">
                        <i class="fas fa-vault text-xl text-white"></i>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-800">Vault<span class="text-indigo-600">Pro</span></h1>
                </div>

                <nav class="space-y-1">
                    <button onclick="setFilter('all')" id="link-all" class="sidebar-link active w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold transition-all hover:bg-slate-50">
                        <i class="fas fa-layer-group w-5"></i> All Media
                    </button>
                    <button onclick="setFilter('photos')" id="link-photos" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold transition-all hover:bg-slate-50">
                        <i class="fas fa-image w-5"></i> Photos
                    </button>
                    <button onclick="setFilter('videos')" id="link-videos" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold transition-all hover:bg-slate-50">
                        <i class="fas fa-video w-5"></i> Videos
                    </button>
                    <button onclick="setFilter('favorites')" id="link-favorites" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold transition-all hover:bg-slate-50">
                        <i class="fas fa-heart w-5"></i> Favorites
                    </button>
                    <div class="pt-4 border-t border-slate-100 mt-4">
                        <button onclick="handleLogout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold text-slate-400 hover:text-red-500 hover:bg-red-50 transition-all">
                            <i class="fas fa-right-from-bracket w-5"></i> Logout
                        </button>
                    </div>
                </nav>
            </div>

            <div class="mt-auto p-6 space-y-4">
                <div class="bg-slate-50 rounded-2xl p-4 border border-slate-200">
                    <p class="text-[10px] text-slate-400 font-bold mb-2 uppercase tracking-widest">Storage Status</p>
                    <p id="itemCount" class="text-xs text-slate-600 font-medium">Syncing library...</p>
                </div>
                <button onclick="document.getElementById('fileInput').click()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-indigo-500/20 transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-plus text-sm"></i> Add Shared Media
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative overflow-hidden">
            <header class="h-20 border-b border-slate-200 flex items-center justify-between px-8 bg-white/80 backdrop-blur-md">
                <div class="relative w-96">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                    <input type="text" id="searchInput" placeholder="Search files..." class="w-full bg-slate-50 border border-slate-200 rounded-full py-2.5 pl-11 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all text-slate-700">
                </div>

                <div class="flex items-center gap-4">
                    <select id="sortSelect" onchange="render()" class="bg-white border border-slate-200 text-xs font-semibold rounded-lg px-4 py-2 focus:outline-none cursor-pointer hover:border-slate-300 text-slate-600">
                        <option value="date-desc">Newest First</option>
                        <option value="date-asc">Oldest First</option>
                        <option value="size-desc">Size (Large)</option>
                        <option value="size-asc">Size (Small)</option>
                    </select>
                    <div class="h-8 w-[1px] bg-slate-200"></div>
                    <div class="flex items-center gap-3">
                        <span class="text-xs text-slate-600 font-bold hidden md:block">ZEN OOM</span>
                        <div class="w-9 h-9 rounded-full bg-indigo-600 flex items-center justify-center text-[10px] font-bold text-white shadow-md">ZO</div>
                    </div>
                </div>
            </header>

            <div id="gallery" class="flex-1 overflow-y-auto p-8 custom-scrollbar">
                <div id="emptyState" class="flex flex-col items-center justify-center h-full text-slate-400 space-y-4">
                    <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center text-3xl">
                        <i class="fas fa-photo-film"></i>
                    </div>
                    <h2 class="text-lg font-bold text-slate-700">Vault is empty</h2>
                    <p class="text-sm max-w-xs text-center">Upload images or videos to share them with the cloud.</p>
                </div>
                <div id="mediaGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
            </div>

            <div id="dropOverlay" class="absolute inset-0 z-50 flex items-center justify-center pointer-events-none rounded-3xl m-4">
                <div class="text-center">
                    <i class="fas fa-cloud-arrow-up text-6xl text-indigo-600 mb-4 animate-bounce"></i>
                    <h2 class="text-2xl font-bold text-indigo-600">Drop to Sync</h2>
                </div>
            </div>
        </main>
    </div>

    <input type="file" id="fileInput" class="hidden" multiple accept="image/*,video/*">

    <!-- Player Modal -->
    <div id="playerModal" class="fixed inset-0 z-[300] bg-slate-900/95 hidden flex items-center justify-center backdrop-blur-md">
        <button onclick="closePlayer()" class="absolute top-6 right-6 text-white/50 hover:text-white text-3xl z-[310] transition-all hover:rotate-90">
            <i class="fas fa-times"></i>
        </button>
        <button onclick="navPlayer(-1)" class="absolute left-4 md:left-8 top-1/2 -translate-y-1/2 text-white/20 hover:text-white text-4xl md:text-5xl z-[310] p-4 transition-colors">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button onclick="navPlayer(1)" class="absolute right-4 md:right-8 top-1/2 -translate-y-1/2 text-white/20 hover:text-white text-4xl md:text-5xl z-[310] p-4 transition-colors">
            <i class="fas fa-chevron-right"></i>
        </button>

        <div class="w-full h-full flex flex-col items-center justify-center p-4 md:p-12">
            <div id="playerContent" class="w-full flex items-center justify-center relative shadow-2xl"></div>
        </div>

        <div class="absolute bottom-0 inset-x-0 p-6 md:p-8 glass flex flex-col md:flex-row justify-between items-center md:items-end gap-4 pointer-events-auto border-t border-white/20">
            <div class="text-center md:text-left">
                <h2 id="playerName" class="text-xl font-bold text-slate-900 mb-1 truncate max-w-xs md:max-w-xl">File Name</h2>
                <p id="playerMeta" class="text-slate-500 text-xs font-semibold"></p>
            </div>
            <div class="flex gap-4">
                <button id="playerFavBtn" class="bg-white hover:bg-slate-50 w-12 h-12 rounded-xl flex items-center justify-center text-xl transition-all shadow-sm border border-slate-200">
                    <i class="far fa-heart text-slate-400"></i>
                </button>
                <button id="playerDownloadBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white w-12 h-12 rounded-xl flex items-center justify-center text-xl transition-all shadow-lg">
                    <i class="fas fa-download"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="toastRoot" class="fixed bottom-6 right-6 z-[400] space-y-2"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'shared-vault-v1';

        const CREDENTIALS = { u: 'zenoom', p: 'AdMin123' };
        let items = [];
        let currentFilter = 'all';
        let searchQuery = '';
        let activePlayerIndex = -1;
        let user = null;

        // UI Handlers
        const authScreen = document.getElementById('authScreen');
        const appLayout = document.getElementById('appLayout');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');

        // Logic
        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                setupRealtimeSync();
                unlockVault();
            }
        });

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const u = document.getElementById('userIn').value;
            const p = document.getElementById('passIn').value;

            if (u === CREDENTIALS.u && p === CREDENTIALS.p) {
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i> Authenticating...';
                
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (err) {
                    console.error("Auth failed", err);
                    loginBtn.disabled = false;
                    loginBtn.innerText = 'Unlock Vault';
                    showToast("Cloud connection error. Try again.");
                }
            } else {
                errorMsg.classList.remove('hidden');
                setTimeout(() => errorMsg.classList.add('hidden'), 3000);
            }
        };

        function unlockVault() {
            authScreen.style.opacity = '0';
            setTimeout(() => {
                authScreen.classList.add('hidden');
                appLayout.classList.remove('pointer-events-none');
                appLayout.classList.add('opacity-100');
            }, 500);
        }

        function setupRealtimeSync() {
            if (!user) return;
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'mediaItems');
            onSnapshot(q, (snapshot) => {
                items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render();
            }, (err) => {
                console.error("Sync error:", err);
            });
        }

        async function handleFiles(files) {
            if (!user) return;
            const newFiles = Array.from(files);
            showToast(`Syncing ${newFiles.length} files...`);
            
            for (const file of newFiles) {
                const itemData = await processFile(file);
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'mediaItems'), {
                    ...itemData,
                    createdAt: serverTimestamp()
                });
            }
        }

        async function processFile(file) {
            const isVideo = file.type.startsWith('video/');
            const url = URL.createObjectURL(file);
            let duration = 0;
            if (isVideo) {
                duration = await new Promise(res => {
                    const v = document.createElement('video');
                    v.preload = 'metadata';
                    v.onloadedmetadata = () => res(v.duration);
                    v.src = url;
                });
            }
            return {
                name: file.name,
                type: file.type,
                size: file.size,
                url: url,
                isVideo: isVideo,
                timestamp: Date.now(),
                duration: duration,
                isFavorite: false
            };
        }

        // Exposed functions
        window.setFilter = (f) => {
            currentFilter = f;
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`link-${f}`).classList.add('active');
            render();
        };

        window.toggleFavorite = async (id, e) => {
            if(e) e.stopPropagation();
            const item = items.find(i => i.id === id);
            if(item && user) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'mediaItems', id), {
                    isFavorite: !item.isFavorite
                });
            }
        };

        window.deleteItem = async (id, e) => {
            if(e) e.stopPropagation();
            if(confirm("Delete from shared cloud?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'mediaItems', id));
                showToast("Item deleted.");
            }
        };

        window.openPlayer = (id) => {
            const index = items.findIndex(i => i.id === id);
            if (index === -1) return;
            activePlayerIndex = index;
            updatePlayerContent();
            document.getElementById('playerModal').classList.remove('hidden');
        };

        window.closePlayer = () => {
            document.getElementById('playerModal').classList.add('hidden');
            document.getElementById('playerContent').innerHTML = '';
        };

        window.navPlayer = (dir) => {
            activePlayerIndex = (activePlayerIndex + dir + items.length) % items.length;
            updatePlayerContent();
        };

        window.handleLogout = () => window.location.reload();

        function updatePlayerContent() {
            const item = items[activePlayerIndex];
            const content = document.getElementById('playerContent');
            const favBtn = document.getElementById('playerFavBtn');

            content.innerHTML = item.isVideo ? 
                `<video src="${item.url}" controls autoplay class="shadow-2xl"></video>` :
                `<img src="${item.url}" class="shadow-2xl">`;
            
            document.getElementById('playerName').innerText = item.name;
            document.getElementById('playerMeta').innerText = `${item.isVideo ? 'Video' : 'Image'} • ${formatSize(item.size)} • Synced`;
            favBtn.innerHTML = `<i class="${item.isFavorite ? 'fas text-red-500' : 'far'} fa-heart"></i>`;
            favBtn.onclick = (e) => window.toggleFavorite(item.id, e);
            
            document.getElementById('playerDownloadBtn').onclick = () => {
                const a = document.createElement('a'); a.href = item.url; a.download = item.name; a.click();
            };
        }

        function render() {
            const grid = document.getElementById('mediaGrid');
            const filtered = items.filter(i => {
                const matches = i.name.toLowerCase().includes(searchQuery);
                if (currentFilter === 'photos') return !i.isVideo && matches;
                if (currentFilter === 'videos') return i.isVideo && matches;
                if (currentFilter === 'favorites') return i.isFavorite && matches;
                return matches;
            });

            const [crit, dir] = document.getElementById('sortSelect').value.split('-');
            filtered.sort((a, b) => {
                const valA = crit === 'date' ? a.timestamp : a.size;
                const valB = crit === 'date' ? b.timestamp : b.size;
                return dir === 'asc' ? valA - valB : valB - valA;
            });

            document.getElementById('emptyState').style.display = filtered.length ? 'none' : 'flex';
            grid.innerHTML = filtered.map(item => `
                <div onclick="openPlayer('${item.id}')" class="media-card group relative aspect-square rounded-2xl overflow-hidden cursor-pointer shadow-sm">
                    ${item.isVideo ? `<video src="${item.url}" class="w-full h-full object-cover"></video>` : `<img src="${item.url}" class="w-full h-full object-cover">`}
                    <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div class="actions absolute inset-x-0 bottom-0 p-3 flex justify-between items-center z-10">
                        <button onclick="toggleFavorite('${item.id}', event)" class="w-8 h-8 rounded-lg bg-white/90 shadow-sm flex items-center justify-center text-xs">
                            <i class="${item.isFavorite ? 'fas text-red-500' : 'far text-slate-400'} fa-heart"></i>
                        </button>
                        <button onclick="deleteItem('${item.id}', event)" class="w-8 h-8 rounded-lg bg-white/90 shadow-sm flex items-center justify-center text-xs text-slate-400 hover:text-red-500">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                    ${item.isVideo ? `<div class="absolute top-2 left-2 bg-indigo-600 text-white text-[9px] px-1.5 py-0.5 rounded font-bold uppercase tracking-tighter">Video</div>` : ''}
                </div>
            `).join('');
            document.getElementById('itemCount').innerText = `${items.length} shared files`;
        }

        // Event Setup
        document.getElementById('fileInput').onchange = (e) => handleFiles(e.target.files);
        document.getElementById('searchInput').oninput = (e) => { searchQuery = e.target.value.toLowerCase(); render(); };
        window.addEventListener('dragover', (e) => { e.preventDefault(); document.getElementById('dropOverlay').style.display = 'flex'; });
        window.addEventListener('dragleave', () => document.getElementById('dropOverlay').style.display = 'none');
        window.addEventListener('drop', (e) => { e.preventDefault(); document.getElementById('dropOverlay').style.display = 'none'; handleFiles(e.dataTransfer.files); });

        function formatSize(b) {
            if (!b) return '0 B';
            const s = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(b) / Math.log(1024));
            return (b / Math.pow(1024, i)).toFixed(1) + ' ' + s[i];
        }

        function showToast(msg) {
            const root = document.getElementById('toastRoot');
            const t = document.createElement('div');
            t.className = 'bg-white border border-slate-200 text-slate-800 px-5 py-3 rounded-xl shadow-xl flex items-center gap-3 animate-slide-in font-medium';
            t.innerHTML = `<i class="fas fa-info-circle text-indigo-600"></i><span class="text-sm">${msg}</span>`;
            root.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
        }
    </script>

    <style>
        @keyframes slide-in { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-slide-in { animation: slide-in 0.3s ease-out forwards; }
    </style>
</body>
</html>
