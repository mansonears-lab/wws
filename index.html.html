<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Vault Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .sidebar-item.active { background: #6366f1; color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .media-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid #e2e8f0; }
        .media-item:hover { transform: translateY(-4px); border-color: #6366f1; box-shadow: 0 12px 20px -8px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- MAIN APP LAYOUT -->
    <div id="mainApp" class="flex w-full h-full transition-opacity duration-700">
        <!-- Sidebar -->
        <aside class="w-72 bg-white border-r border-slate-200 flex flex-col p-8">
            <div class="flex items-center gap-3 mb-12">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-100">
                    <i class="fas fa-cloud text-white text-sm"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">VaultPro</span>
            </div>

            <nav class="flex-1 space-y-2">
                <button onclick="changeFilter('all')" class="sidebar-item active w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl font-semibold text-slate-500 hover:bg-slate-50 transition-all">
                    <i class="fas fa-th-large"></i> All Files
                </button>
                <button onclick="changeFilter('fav')" class="sidebar-item w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl font-semibold text-slate-500 hover:bg-slate-50 transition-all">
                    <i class="fas fa-heart"></i> Favorites
                </button>
            </nav>

            <div class="mt-auto space-y-4">
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Cloud Sync</span>
                        <div id="dbStatusIcon" class="w-2 h-2 rounded-full bg-slate-300"></div>
                    </div>
                    <p id="dbStatusText" class="text-xs font-semibold text-slate-600">Connecting...</p>
                </div>
                <button onclick="document.getElementById('fileUpload').click()" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-bold shadow-xl shadow-indigo-100 transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-plus"></i> Upload Media
                </button>
            </div>
        </aside>

        <!-- Gallery -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10">
                <h2 id="viewTitle" class="text-lg font-bold text-slate-800">Shared Library</h2>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <div class="text-sm font-bold text-slate-900">ZEN OOM</div>
                        <div class="text-[10px] text-indigo-500 font-bold uppercase tracking-tighter">Administrator</div>
                    </div>
                    <div class="w-11 h-11 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-white font-bold shadow-lg">ZO</div>
                </div>
            </header>

            <div id="galleryGrid" class="flex-1 p-10 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-8 overflow-y-auto">
                <!-- Items injected here -->
            </div>
        </main>
    </div>

    <input type="file" id="fileUpload" class="hidden" multiple accept="image/*,video/*">

    <!-- Lightbox Player -->
    <div id="player" class="fixed inset-0 z-[2000] bg-slate-950/98 hidden flex items-center justify-center p-6 backdrop-blur-xl" onclick="closePlayer()">
        <button class="absolute top-8 right-8 text-white/50 hover:text-white text-3xl transition-transform hover:rotate-90">
            <i class="fas fa-times"></i>
        </button>
        <div id="playerContainer" class="w-full max-w-5xl h-full flex items-center justify-center" onclick="event.stopPropagation()"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // CONFIG & STATE
        let db, auth, user;
        let items = [];
        let currentFilter = 'all';

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'vault-app-001';
        const firebaseConfig = JSON.parse(__firebase_config);

        // INITIALIZE CONNECTION IMMEDIATELY
        window.onload = async () => {
            try {
                await startConnection();
            } catch (err) {
                console.error("Connection error", err);
                document.getElementById('dbStatusText').innerText = 'Connection Failed';
            }
        };

        // 1. FIREBASE CONNECTION
        async function startConnection() {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            // Auth First (MANDATORY RULE 3)
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }

            onAuthStateChanged(auth, (u) => {
                if (u) {
                    user = u;
                    setupSync();
                }
            });
        }

        // 2. DATABASE SYNC (RULE 1 & 2)
        function setupSync() {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'media');
            
            onSnapshot(colRef, (snapshot) => {
                items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // Visual confirmation
                const statusIcon = document.getElementById('dbStatusIcon');
                if(statusIcon) statusIcon.className = 'w-2 h-2 rounded-full bg-green-500 animate-pulse';
                
                const statusText = document.getElementById('dbStatusText');
                if(statusText) statusText.innerText = 'Cloud Connected';
                
                render();
            }, (err) => {
                console.error("Sync error", err);
                const statusText = document.getElementById('dbStatusText');
                if(statusText) statusText.innerText = 'Sync Error';
            });
        }

        // 3. FILE UPLOAD
        document.getElementById('fileUpload').onchange = async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length || !user) return;

            for (const file of files) {
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const mediaData = {
                        name: file.name,
                        url: event.target.result,
                        type: file.type,
                        timestamp: Date.now(),
                        isFav: false
                    };

                    try {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'media'), mediaData);
                    } catch (err) {
                        console.error("Upload failed", err);
                    }
                };
                reader.readAsDataURL(file);
            }
        };

        // 4. UI ACTIONS
        window.render = () => {
            const grid = document.getElementById('galleryGrid');
            const filtered = items.filter(i => currentFilter === 'all' || (currentFilter === 'fav' && i.isFav));
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-400">
                    <i class="fas fa-folder-open text-5xl mb-4 opacity-20"></i>
                    <p class="font-semibold italic">Library is empty. Upload media to begin.</p>
                </div>`;
                return;
            }

            grid.innerHTML = filtered.map(item => `
                <div onclick="openPlayer('${item.id}')" class="media-item aspect-square bg-white rounded-[2rem] overflow-hidden relative group">
                    ${item.type.includes('video') ? 
                        `<video src="${item.url}" class="w-full h-full object-cover"></video>` : 
                        `<img src="${item.url}" class="w-full h-full object-cover">`
                    }
                    <div class="absolute inset-0 bg-indigo-900/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                        <div class="flex gap-2">
                             <button onclick="toggleFav('${item.id}', event)" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-sm shadow-xl hover:scale-110 transition-transform">
                                <i class="${item.isFav ? 'fas text-red-500' : 'far text-slate-400'} fa-heart"></i>
                             </button>
                             <button onclick="removeItem('${item.id}', event)" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-sm shadow-xl hover:scale-110 transition-transform text-slate-400 hover:text-red-500">
                                <i class="fas fa-trash"></i>
                             </button>
                        </div>
                    </div>
                    ${item.type.includes('video') ? `<div class="absolute top-4 left-4 bg-indigo-600 text-white text-[9px] px-2 py-1 rounded-lg font-bold uppercase">Video</div>` : ''}
                </div>
            `).join('');
        };

        window.toggleFav = async (id, e) => {
            e.stopPropagation();
            if(!db) return;
            const item = items.find(i => i.id === id);
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'media', id), { isFav: !item.isFav });
        };

        window.removeItem = async (id, e) => {
            e.stopPropagation();
            if(!db) return;
            const customConfirm = window.confirm("Delete this shared item?");
            if(customConfirm) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'media', id));
            }
        };

        window.openPlayer = (id) => {
            const item = items.find(i => i.id === id);
            const container = document.getElementById('playerContainer');
            container.innerHTML = item.type.includes('video') ? 
                `<video src="${item.url}" controls autoplay class="max-h-full rounded-3xl shadow-2xl"></video>` :
                `<img src="${item.url}" class="max-h-full rounded-3xl shadow-2xl">`;
            document.getElementById('player').classList.remove('hidden');
        };

        window.closePlayer = () => {
            document.getElementById('player').classList.add('hidden');
            document.getElementById('playerContainer').innerHTML = '';
        };

        window.changeFilter = (f) => {
            currentFilter = f;
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('viewTitle').innerText = f === 'all' ? 'Shared Library' : 'Favorites Only';
            render();
        };

    </script>
</body>
</html>
